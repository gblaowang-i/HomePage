services:
  nav-center:
    container_name: nav-center
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 密码从项目目录下的 .env 读取（Compose 自动加载）；勿把 .env 提交到 Git
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      SITE_PASSWORD: ${SITE_PASSWORD:-}
    volumes:
      - ./data.json:/app/data.json
